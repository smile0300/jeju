<!DOCTYPE html>
<!-- Ver. 2.5 (Cache-Busting) -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>济州岛旅游助手 | 제주 여행 도우미</title>
    <link rel="stylesheet" href="style.css?v=2.5">
</head>
<body>
    <header class="app-bar home-bar" style="position: relative;">
        <span class="logo-icon">🏝️</span>
        <h1 class="bar-title">济州岛旅游助手</h1>
    </header>

    <section id="home" class="app-section active">
        <div class="home-screen">
            <div class="home-welcome">
                <h1>欢迎来到济州岛</h1>
                <p>实时信息 · 智能规划 · 完美旅程</p>
            </div>
            <div class="home-grid">
                <div class="home-item item-cctv" onclick="showSection('cctv')">
                    <span class="item-icon">📹</span>
                    <span class="item-label">实时监控</span>
                </div>
                <div class="home-item item-weather" onclick="showSection('weather')">
                    <span class="item-icon">🌤️</span>
                    <span class="item-label">天气预报</span>
                </div>
                <div class="home-item item-hallasan" onclick="showSection('hallasan')">
                    <span class="item-icon">⛰️</span>
                    <span class="item-label">汉拿山</span>
                </div>
                <div class="home-item item-airport" onclick="showSection('airport')">
                    <span class="item-icon">✈️</span>
                    <span class="item-label">机场信息</span>
                </div>
                <div class="home-item item-lost" onclick="showSection('lost-found')">
                    <span class="item-icon">🔍</span>
                    <span class="item-label">失物招领</span>
                </div>
                <div class="home-item item-festival" onclick="showSection('festival')">
                    <span class="item-icon">🎉</span>
                    <span class="item-label">节日活动</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Sub-sections (CCTV, Weather, Hallasan, Airport, Festival, LostFound) -->
    <!-- (Content omitted for brevity in implemention plan, will be fully written in final tool call) -->

    <section id="cctv" class="app-section">
        <header class="app-bar">
            <button class="back-btn" onclick="showSection('home')">←</button>
            <h2 class="bar-title">📹 实时监控</h2>
        </header>
        <div class="section"><div class="container"><div class="cctv-grid" id="cctv-grid"></div></div></div>
    </section>

    <section id="weather" class="app-section">
        <header class="app-bar"><button class="back-btn" onclick="showSection('home')">←</button><h2 class="bar-title">🌤️ 天气预报</h2></header>
        <div class="section"><div class="container"><div id="weather-alerts-container" class="weather-alerts-container" style="display:none"></div><div class="location-tabs" id="location-tabs"></div><div id="weather-content-jeju" class="location-weather active"></div></div></div>
    </section>

    <section id="hallasan" class="app-section">
        <header class="app-bar"><button class="back-btn" onclick="showSection('home')">←</button><h2 class="bar-title">⛰️ 汉拿山登山信息</h2></header>
    </section>

    <section id="airport" class="app-section">
        <header class="app-bar"><button class="back-btn" onclick="showSection('home')">←</button><h2 class="bar-title">✈️ 济州国际机场</h2></header>
    </section>

    <section id="festival" class="app-section">
        <header class="app-bar"><button class="back-btn" onclick="showSection('home')">←</button><h2 class="bar-title">🎉 济州精彩活动</h2></header>
        <div class="section"><div class="container"><div id="festival-list" class="festival-list"></div></div></div>
    </section>

    <section id="lost-found" class="app-section">
        <header class="app-bar"><button class="back-btn" onclick="showSection('home')">←</button><h2 class="bar-title">🔍 济州失物招领</h2></header>
        <div class="section"><div class="container">
            <div class="lost-filter-container search-filter-box">
                <div class="filter-row">
                    <select id="pkupCmdtyLclsfCd" class="filter-select"><option value="">물품 분류 선택</option></select>
                </div>
                <div class="filter-row" style="display:flex;gap:10px;">
                    <input type="date" id="start-date" class="date-input" style="flex:1;">
                    <input type="date" id="end-date" class="date-input" style="flex:1;">
                    <button class="search-btn" onclick="fetchFoundGoodsManual()">🔍</button>
                </div>
            </div>
            <div id="lost-goods-grid" class="lost-goods-grid"></div>
        </div></div>
    </section>

    <footer class="app-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-section">
                    <div class="xhs-footer-card">
                        <div class="xhs-qr-row">
                            <div class="xhs-info-section">
                                <h4>济州本地人_正敬</h4>
                                <p class="xhs-id">小红书 ID: jeju_jk</p>
                                <p>扫描二维码关注</p>
                            </div>
                            <div class="xhs-qr-box">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.xiaohongshu.com/user/profile/5f9a7e3d0000000001006c5a" alt="QR Code">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="footer-section">
                    <h3 class="source-title">🏝️ 실시간 정보 출처</h3>
                    <ul class="footer-links">
                        <li>• 韩国气象厅 / 韩国机场公社</li>
                        <li>• 济州特别自治道 / Visit Jeju</li>
                        <li>• 警察厅 LOST112</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom"><p>© 2026 济州旅行秘书 · 保留所有权利</p></div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="script.js?v=2.5"></script>
</body>
</html>
