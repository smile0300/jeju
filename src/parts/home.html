<!-- ===== Home Section ===== -->
<section id="home" class="app-section active">
    <div class="home-screen">
        <div class="home-welcome">
            <h1>测试模式</h1>
            <p><strong>请提出您在济州岛旅行中的不便之处！</strong></p>
            <button class="feature-request-btn" onclick="openFeatureModal()">💡 提交建议 / 意见反馈</button>
        </div>

        <!-- ===== Feature Request Modal ===== -->
        <div id="feature-request-modal" class="modal-overlay" style="display:none; z-index: 10001;"
            onclick="closeFeatureModal()">
            <div class="modal-content" style="max-width: 400px; padding: 30px; background: white;"
                onclick="event.stopPropagation()">
                <button class="modal-close" style="color: #333;" onclick="closeFeatureModal()">✕</button>
                <h3 style="margin-bottom: 12px; font-size: 1.25rem; color: var(--text-primary);">💡 提交建议或功能请求</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">您的反馈对我们非常重要！</p>
                <textarea id="feature-content" placeholder="在此输入您的建议或发现的漏洞..."
                    style="width: 100%; min-height: 120px; padding: 15px; border-radius: 12px; border: 1.5px solid #eee; font-family: inherit; font-size: 0.95rem; resize: vertical; margin-bottom: 20px; outline: none; transition: border-color 0.2s;"></textarea>
                <button id="feature-submit-btn" onclick="submitFeatureRequest()"
                    style="width: 100%; padding: 14px; border-radius: 12px; background: var(--primary-gradient); color: white; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">提交反馈</button>
                <div id="feature-status"
                    style="margin-top: 15px; font-size: 0.85rem; text-align: center; display: none;"></div>
            </div>
        </div>
        <div class="home-grid">
            <button class="home-item item-cctv" onclick="showSection('cctv')" type="button">
                <span class="item-icon">📹</span>
                <span class="item-label">实时监控</span>
            </button>
            <button class="home-item item-weather" onclick="showSection('weather')" type="button">
                <span class="item-icon">🌤️</span>
                <span class="item-label">天气预报</span>
            </button>
            <button class="home-item item-hallasan" onclick="showSection('hallasan')" type="button">
                <span class="item-icon">⛰️</span>
                <span class="item-label">汉拿山</span>
            </button>
            <button class="home-item item-airport" onclick="showSection('airport')" type="button">
                <span class="item-icon">✈️</span>
                <span class="item-label">机场信息</span>
            </button>
            <button class="home-item item-lost" onclick="showSection('lost-found')" type="button">
                <span class="item-icon">🔍</span>
                <span class="item-label">失物招领</span>
            </button>
            <button class="home-item item-festival" onclick="showSection('festival')" type="button">
                <span class="item-icon">🎉</span>
                <span class="item-label">节日活动</span>
            </button>
            <!-- 빈 항목들 -->
            <div class="home-item item-empty"></div>
            <div class="home-item item-empty"></div>
            <div class="home-item item-empty"></div>
        </div>
    </div>
</section>
