    <script>
        // Global fallback stubs to prevent ReferenceError before modules load
        window.showSection = window.showSection || (() => { });
        window.openCctvModalById = window.openCctvModalById || (() => { });
        window.switchWeatherLocation = window.switchWeatherLocation || (() => { });
        window.switchFlightTab = window.switchFlightTab || (() => { });
        window.switchLostView = window.switchLostView || (() => { });
        window.selectFestivalMonth = window.selectFestivalMonth || (() => { });
        window.openFeatureModal = window.openFeatureModal || (() => { });
        window.closeFeatureModal = window.closeFeatureModal || (() => { });
        window.submitFeatureRequest = window.submitFeatureRequest || (() => { });
        window.openLostReportModal = window.openLostReportModal || (() => { });
        window.closeLostReportModal = window.closeLostReportModal || (() => { });
        window.submitLostReport = window.submitLostReport || (() => { });
        window.fetchFoundGoodsManual = window.fetchFoundGoodsManual || (() => { });
        window.openWechatQR = window.openWechatQR || (() => { });
        window.closeWechatQR = window.closeWechatQR || (() => { });
        window.copyWechatId = window.copyWechatId || (() => { });
        window.closeCctvModal = window.closeCctvModal || (() => { });
        window.closeLostDetailModal = window.closeLostDetailModal || (() => { });
        window.handleLostImageChange = window.handleLostImageChange || (() => { });
        window.openRewardDetail = window.openRewardDetail || (() => { });
        window.closeRewardDetailModal = window.closeRewardDetailModal || (() => { });
        window.applyRewardMission = window.applyRewardMission || (() => { });
        window.closeRewardWechatModal = window.closeRewardWechatModal || (() => { });
        window.hallasanApp = window.hallasanApp || { fetchStatus: () => {} };
        window.weatherApp = window.weatherApp || { retryFetch: () => {}, scrollToHourly: () => {} };

        // Mobile global error handler for debugging
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errorMsg = "❌ JS Error: " + msg + "\nAt: " + lineNo + ":" + columnNo + "\nUrl: " + url;
            console.error(errorMsg);
            
            // 중국 내 만리방화벽(GFW) 차단 및 외부 라이브러리 지연으로 인한 'Script error.' 무시
            if (!url || msg === 'Script error.' || lineNo === 0) {
                return false; 
            }

            // GTM, AdSense 등의 트래킹 에러 및 HLS.js의 InvalidStateError(Race condition)는 사용자 팝업에서 제외함
            const lowerUrl = url.toLowerCase();
            const isTracking = lowerUrl.includes('gtm.js') || lowerUrl.includes('adsbygoogle.js') || lowerUrl.includes('analytics');
            const isInvalidState = msg.includes('InvalidStateError');

            if (!isTracking && !isInvalidState) {
                alert(errorMsg + "\n\n请截图此错误并联系开发人员。");
            }
            return false;
        };

        // CORS detection for local file protocol
        if (window.location.protocol === 'file:') {
            console.warn('⚠️ 济州岛实时: 检测到正在通过 file:// 协议访问。由于浏览器 CORS 安全策略，ES 模块(JS)可能无法加载。建议使用 VS Code Live Server 或本地 Web 服务器。');
            window.addEventListener('load', () => {
                setTimeout(() => {
                    if (window.showSection.toString().includes('() => { }') || window.showSection.toString().includes('()=>{}')) {
                        const msg = '❌ 脚本加载失败: 浏览器阻止了本地 JS 模块的加载。\n\n解决办法:\n1. 请使用 VS Code 的 "Live Server" 插件运行\n2. 或者在终端运行 "python -m http.server"\n3. 然后通过 http://localhost... 访问';
                        console.error(msg);
                        alert(msg);
                    }
                }, 1500);
            });
        }
    </script>
