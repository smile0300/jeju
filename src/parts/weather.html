<!-- ===== Weather Section ===== -->
<section id="weather" class="app-section">

                        <span class="tab-icon">🏙️</span>
                        <span class="tab-name">济州市</span>
                    </button>

                        <span class="tab-name">涯月</span>
                    </button>

                        <span class="tab-name">挟才</span>
                    </button>

                        <span class="tab-name">咸德</span>

                        <span class="tab-name">日出峰</span>

                    <button class="location-tab" data-loc="udo" onclick="switchWeatherLocation('udo')">
                        <span class="tab-icon">🐄</span>
                        <span class="tab-name">牛岛</span>
                    </button>
                    <button class="location-tab" data-loc="hallasan" onclick="switchWeatherLocation('hallasan')">
                        <span class="tab-icon">⛰️</span>
                        <span class="tab-name">汉拿山</span>

                </div>

                    </div>
                    <div class="weather-details-bar" id="details-bar-jeju"></div>
                    <div class="naver-card hourly-forecast-card">
                        <div class="card-header"><span class="day-label active">今天</span><span class="day-label">明天</span></div>
                        <div class="hourly-table-container" id="hourly-table-jeju"></div>
                    </div>
                    <div class="naver-card weekly-forecast-card">
