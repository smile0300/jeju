<!-- ===== Weather Section ===== -->
<section id="weather" class="app-section">
    <header class="app-bar">
        <button class="back-btn" onclick="showSection('home')">←</button>
        <h2 class="bar-title">🌤️ 天气预报</h2>
    </header>
    <div class="section section-alt">
        <div class="container">
            
            <!-- Regional Navigation Area -->
            <div class="weather-nav-wrapper">
                <div class="location-tabs" id="location-tabs">
                    <!-- Row 1: North + South + West (5 items) -->
                    <div class="loc-row">
                        <div class="loc-group-wrapper group-north">
                            <span class="group-label">北线</span>
                            <button class="location-tab active" data-loc="jeju" onclick="switchWeatherLocation('jeju')">
                                <span class="tab-name">济州市</span>
                            </button>
                        </div>
                        <div class="loc-group-wrapper group-south">
                            <span class="group-label">南线</span>
                            <button class="location-tab" data-loc="seogwipo" onclick="switchWeatherLocation('seogwipo')">
                                <span class="tab-name">西归浦</span>
                            </button>
                        </div>
                        <div class="loc-group-wrapper group-west">
                            <span class="group-label">西线</span>
                            <button class="location-tab" data-loc="aewol" onclick="switchWeatherLocation('aewol')">
                                <span class="tab-name">涯月</span>
                            </button>
                            <button class="location-tab" data-loc="hyeopjae" onclick="switchWeatherLocation('hyeopjae')">
                                <span class="tab-name">挟才</span>
                            </button>
                            <button class="location-tab" data-loc="sanbangsan" onclick="switchWeatherLocation('sanbangsan')">
                                <span class="tab-name">山房山</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Row 2: East + Hallasan (5 items) -->
                    <div class="loc-row">
                        <div class="loc-group-wrapper group-east">
                            <span class="group-label">东线</span>
                            <button class="location-tab" data-loc="hamdeok" onclick="switchWeatherLocation('hamdeok')">
                                <span class="tab-name">咸德</span>
                            </button>
                            <button class="location-tab" data-loc="woljeong" onclick="switchWeatherLocation('woljeong')">
                                <span class="tab-name">月汀</span>
                            </button>
                            <button class="location-tab" data-loc="seongsan" onclick="switchWeatherLocation('seongsan')">
                                <span class="tab-name">日出峰</span>
                            </button>
                            <button class="location-tab" data-loc="udo" onclick="switchWeatherLocation('udo')">
                                <span class="tab-name">牛岛</span>
                            </button>
                        </div>
                        <div class="loc-group-wrapper group-mountain">
                            <span class="group-label">山岳</span>
                            <button class="location-tab" data-loc="hallasan" onclick="switchWeatherLocation('hallasan')">
                                <span class="tab-name">汉拿山</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="weather-alerts-container" class="weather-alerts-container" style="display: flex;">
                <div class="weather-alert-card no-alerts">
                    <div class="alert-msg">正在检查气象特报...</div>
                </div>
            </div>

            <!-- Weather Content Area -->
            <div class="weather-content-wrapper">
                <!-- Jeju -->
                <div id="weather-content-jeju" class="location-weather active">
                    <div class="weather-header-container" id="header-jeju">
                        <div class="location-info">
                            <h3 class="location-name">济州市(莲洞)</h3>
                        </div>
                        <div class="header-action-btns">
                            <button class="header-summary-btn" onclick="window.openWeatherSummaryModal()">📊 简略查看</button>
                            <div class="header-cctv" id="cctv-btn-jeju"><button class="header-cctv-btn" onclick="openCctvModal('tapdong_emg')">📺 CCTV</button></div>
                        </div>
                    </div>
                    <div class="naver-card current-compare-card" id="current-card-jeju">
                        <div class="weather-loader"><div class="weather-spinner"></div><div class="weather-loading-text">正在加载...</div></div>
                    </div>
                    <div class="weather-details-bar" id="details-bar-jeju"></div>
                    <div class="naver-card hourly-forecast-card">
                        <div class="hourly-table-container" id="hourly-table-jeju"></div>
                    </div>
                    <div class="naver-card weekly-forecast-card">
                        <div class="weekly-list-container" id="weekly-list-jeju"></div>
                    </div>
                    <div id="air-quality-jeju" class="air-quality-grid"></div>
                </div>
