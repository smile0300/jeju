<!-- ===== CCTV Modal ===== -->
<div id="cctv-modal" class="modal-overlay" style="display:none" onclick="closeCctvModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeCctvModal()">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<!-- ===== Lost Detail Modal ===== -->
<div id="lost-detail-modal" class="modal-overlay" style="display:none" onclick="closeLostDetailModal()">
    <div class="modal-content lost-detail-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeLostDetailModal()">✕</button>
        <div id="lost-modal-body" class="lost-modal-body">
            <!-- Data will be injected here -->
        </div>
    </div>
</div>

<!-- ===== WeChat QR Modal ===== -->
<div id="wechat-qr-modal" class="modal-overlay" style="display:none; z-index: 10001;" onclick="closeWechatQR()">
    <div class="modal-content" style="max-width: 320px; text-align: center; padding: 30px;"
        onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeWechatQR()">✕</button>
        <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: #3b82f6;">联系我们 (WeChat)</h3>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">通过扫描下方二维码或复制ID添加我的微信</p>
        <img src="/assets/wechat_qr.png"
            style="width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <div class="wechat-copy-box" style="display:flex; gap:8px;">
            <input type="text" id="wechat-id-input" value="jeju_jk" readonly
                style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; font-size:0.9rem; text-align:center;">
            <button onclick="copyWechatId()"
                style="padding:10px 15px; background:var(--primary-gradient); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">复制</button>
        </div>
    </div>
</div>

<!-- ===== Lost Report Form Modal ===== -->
<div id="lost-report-modal" class="modal-overlay" style="display:none; z-index: 10001;"
    onclick="closeLostReportModal()">
    <div class="modal-content lost-report-form-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeLostReportModal()">✕</button>
        <div class="lost-report-header">
            <h3>📝 登记报失物品</h3>
            <p>请填写以下信息，我们将协助您在 LOST112 登记。 (填写越详细找回概率越高)</p>
        </div>
        <div class="lost-report-body">
            <div class="form-group">
                <label>📍 丢失地点 (尽量详细)</label>
                <textarea id="lost-report-location" placeholder="例如：西归浦每日奥来市场, 红色出租车内, GD咖啡厅2层靠窗位..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📅 丢失日期</label>
                    <input type="date" id="lost-report-date">
                </div>
                <div class="form-group">
                    <label>⏰ 大概时间</label>
                    <input type="time" id="lost-report-time">
                </div>
            </div>
            <div class="form-group">
                <label>📦 物品名称</label>
                <input type="text" id="lost-report-item" placeholder="例如：黑色iPhone 15, 棕色古驰钱包, 蓝色背包...">
            </div>
            <div class="form-group">
                <label>🔍 物品特征 (颜色,品牌,内部物品等)</label>
                <textarea id="lost-report-specifics" placeholder="请详细描述物品特征, 帮助我们精准匹配..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📸 选择文件 (必选)</label>
                    <input type="file" id="lost-report-photo" accept="image/*"
                        onchange="handleLostImageChange(event)">
                    <div id="lost-report-photo-preview" class="photo-preview" style="display: none;"></div>
                </div>
                <div class="form-group">
                    <label>💬 您的微信 ID (必填)</label>
                    <input type="text" id="lost-report-wechat" placeholder="方便找到后及时联系您">
                </div>
            </div>
            <div id="lost-report-status" class="form-status"></div>
            <div class="form-row" style="margin-top: 15px; gap: 10px;">
                <button type="button" class="form-submit-btn secondary" style="flex: 1; margin-top: 0; background: #f1f5f9; color: #475569; box-shadow: none;" onclick="closeLostReportModal()">取消</button>
                <button id="lost-report-submit-btn" class="form-submit-btn" style="flex: 2; margin-top: 0;" onclick="submitLostReport()">提交报失登记</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Feature Request Modal ===== -->
<div id="feature-request-modal" class="modal-overlay" style="display:none; z-index: 10001;" onclick="closeFeatureModal()">
    <div class="modal-content" style="max-width: 400px; padding: 30px; background: white;" onclick="event.stopPropagation()">
        <button class="modal-close" style="color: #333;" onclick="closeFeatureModal()">✕</button>
        <h3 style="margin-bottom: 12px; font-size: 1.25rem; color: var(--text-primary);">💡 提交建议或功能请求</h3>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">您的反馈对我们非常重要！</p>
        <textarea id="feature-content" placeholder="在此输入您的建议或发现的漏洞..."
            style="width: 100%; min-height: 120px; padding: 15px; border-radius: 12px; border: 1.5px solid #eee; font-family: inherit; font-size: 0.95rem; resize: vertical; margin-bottom: 20px; outline: none; transition: border-color 0.2s;"></textarea>
        <button id="feature-submit-btn" onclick="submitFeatureRequest()"
            style="width: 100%; padding: 14px; border-radius: 12px; background: var(--primary-gradient); color: white; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">提交反馈</button>
        <div id="feature-status" style="margin-top: 15px; font-size: 0.85rem; text-align: center; display: none;"></div>
    </div>
</div>
