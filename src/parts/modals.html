<!-- ===== CCTV Modal ===== -->
<div id="cctv-modal" class="modal-overlay" style="display:none" onclick="closeCctvModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeCctvModal()">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<!-- CCTV 상세 정보 카드 (전역 사용) -->
<div id="cctv-detail-card" class="cctv-detail-card" onclick="if(event.target===this)closeCctvCard()">
    <div class="cctv-detail-inner">
        <div class="detail-header">
            <h3 id="cctv-target-name">监控名称</h3>
            <button class="detail-close" onclick="closeCctvCard()">✕</button>
        </div>
        <div class="detail-body">
            <div class="video-wrapper">
                <video id="cctv-live-video" muted playsinline autoplay></video>
                <div class="live-indicator">LIVE</div>
            </div>
        </div>
    </div>
</div>

<!-- ===== Lost Detail Modal ===== -->
<div id="lost-detail-modal" class="modal-overlay" style="display:none" onclick="closeLostDetailModal()">
    <div class="modal-content lost-detail-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeLostDetailModal()">✕</button>
        <div id="lost-modal-body" class="lost-modal-body">
            <!-- Data will be injected here -->
        </div>
    </div>
</div>

<!-- ===== WeChat QR Modal ===== -->
<div id="wechat-qr-modal" class="modal-overlay" style="display:none; z-index: 10001;" onclick="closeWechatQR()">
    <div class="modal-content" style="max-width: 320px; text-align: center; padding: 30px;"
        onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeWechatQR()">✕</button>
        <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: #3b82f6;">联系我们 (WeChat)</h3>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px; line-height: 1.4;">通过扫描下方二维码<br>或复制ID添加我的微信</p>
        <img src="/assets/wechat_qr.png"
            style="width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <div class="wechat-copy-box" style="display:flex; gap:8px;">
            <input type="text" id="wechat-id-input" value="jeju_jk" readonly
                style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; font-size:0.9rem; text-align:center;">
            <button onclick="copyWechatId()"
                style="padding:10px 15px; background:var(--primary-gradient); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">复制</button>
        </div>
    </div>
</div>

<!-- ===== Lost Report Form Modal ===== -->
<div id="lost-report-modal" class="modal-overlay" style="display:none; z-index: 10001;"
    onclick="closeLostReportModal()">
    <div class="modal-content lost-report-form-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeLostReportModal()">✕</button>
        <div class="lost-report-header">
            <h3>📝 登记报失物品</h3>
            <p>请填写以下信息，我们将协助您在 LOST112 登记。 (填写越详细找回概率越高)</p>
        </div>
        <div class="lost-report-body">
            <div class="form-group">
                <label>📍 丢失地点 (尽量详细)</label>
                <textarea id="lost-report-location" placeholder="例如：西归浦每日奥来市场, 红色出租车内, GD咖啡厅2层靠窗位..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📅 丢失日期</label>
                    <input type="date" id="lost-report-date">
                </div>
                <div class="form-group">
                    <label>⏰ 大概时间</label>
                    <input type="time" id="lost-report-time">
                </div>
            </div>
            <div class="form-group">
                <label>📦 物品名称</label>
                <input type="text" id="lost-report-item" placeholder="例如：黑色iPhone 15, 棕色古驰钱包, 蓝色背包...">
            </div>
            <div class="form-group">
                <label>🔍 物品特征 (颜色,品牌,内部物品等)</label>
                <textarea id="lost-report-specifics" placeholder="请详细描述物品特征, 帮助我们精准匹配..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📸 选择文件 (必选)</label>
                    <input type="file" id="lost-report-photo" accept="image/*"
                        onchange="handleLostImageChange(event)">
                    <div id="lost-report-photo-preview" class="photo-preview" style="display: none;"></div>
                </div>
                <div class="form-group">
                    <label>💬 您的微信 ID (必填)</label>
                    <input type="text" id="lost-report-name" placeholder="请输入您的姓名" style="margin-bottom: 8px;">
                    <input type="text" id="lost-report-wechat" placeholder="方便找到后及时联系您 (微信ID/联系方式)">
                </div>
            </div>
            <div id="lost-report-status" class="form-status"></div>
            <div class="form-row" style="margin-top: 15px; gap: 10px;">
                <button type="button" class="form-submit-btn secondary" style="flex: 1; margin-top: 0; background: #f1f5f9; color: #475569; box-shadow: none;" onclick="closeLostReportModal()">取消</button>
                <button id="lost-report-submit-btn" class="form-submit-btn" style="flex: 2; margin-top: 0;" onclick="submitLostReport()">提交报失登记</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Feature Request Modal ===== -->
<div id="feature-request-modal" class="modal-overlay" style="display:none; z-index: 10001;" onclick="closeFeatureModal()">
    <div class="modal-content" style="max-width: 400px; padding: 30px; background: white;" onclick="event.stopPropagation()">
        <button class="modal-close" style="color: #333;" onclick="closeFeatureModal()">✕</button>
        <h3 style="margin-bottom: 12px; font-size: 1.25rem; color: var(--text-primary);">💡 提交建议或功能请求</h3>
        <textarea id="feature-content" placeholder="在此输入您的建议或发现的漏洞..."
            style="width: 100%; min-height: 120px; padding: 15px; border-radius: 12px; border: 1.5px solid #eee; font-family: inherit; font-size: 0.95rem; resize: vertical; margin-bottom: 20px; outline: none; transition: border-color 0.2s;"></textarea>
        <button id="feature-submit-btn" onclick="submitFeatureRequest()"
            style="width: 100%; padding: 14px; border-radius: 12px; background: var(--primary-gradient); color: white; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">提交反馈</button>
        <div id="feature-status" style="margin-top: 15px; font-size: 0.85rem; text-align: center; display: none;"></div>
    </div>
</div>

<!-- ===== Share Modal ===== -->
<div id="share-modal" class="modal-overlay" style="display:none; z-index: 10002;" onclick="closeShareModal()">
    <div class="modal-content share-modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeShareModal()">✕</button>
        <div class="share-header">
            <h3 style="margin-bottom: 12px; font-size: 1.25rem; color: var(--text-primary); text-align: center;">📤 分享到 SNS</h3>
            <p style="font-size: 0.9rem; color: #666; text-align: center; margin-bottom: 20px;">分享济州岛实时旅行信息</p>
        </div>
        <div class="share-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px;">
            <button class="share-option-btn wechat-btn" onclick="copyCurrentUrl('wechat')" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px; border-radius: 16px; border: 1px solid #eee; background: white; cursor: pointer;">
                <div class="share-icon" style="font-size: 1.8rem;">💬</div>
                <span style="font-size: 0.8rem; font-weight: 600;">微信分享</span>
            </button>
            <button class="share-option-btn xhs-btn" onclick="copyCurrentUrl('xhs')" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px; border-radius: 16px; border: 1px solid #eee; background: white; cursor: pointer;">
                <div class="share-icon" style="font-size: 1.8rem;">📕</div>
                <span style="font-size: 0.8rem; font-weight: 600;">小红书分享</span>
            </button>
            <button class="share-option-btn universal-btn" onclick="handleWebShare()" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px; border-radius: 16px; border: 1px solid #eee; background: white; cursor: pointer;">
                <div class="share-icon" style="font-size: 1.8rem;">🔗</div>
                <span style="font-size: 0.8rem; font-weight: 600;">系统分享</span>
            </button>
        </div>
        <div class="share-copy-box" style="display:flex; gap:8px;">
            <input type="text" id="share-url-input" value="https://jeju-live.com" readonly
                style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; font-size:0.9rem; text-align:center;">
            <button onclick="copyCurrentUrl()"
                style="padding:10px 15px; background:var(--primary-gradient); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">复制</button>
        </div>
        <div id="share-status" style="margin-top: 15px; font-size: 0.85rem; text-align: center; display: none; color: #07c160; font-weight: 600;"></div>
    </div>
</div>
<!-- ===== Customer Service Modal ===== -->
<div id="cs-modal" class="modal-overlay" style="display:none; z-index: 10001;" onclick="closeCSModal()">
    <div class="modal-content" style="max-width: 400px; padding: 30px; background: white;" onclick="event.stopPropagation()">
        <button class="modal-close" style="color: #333;" onclick="closeCSModal()">✕</button>
        <h3 style="margin-bottom: 12px; font-size: 1.25rem; color: var(--text-primary);">🎧 联系客服</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px; line-height: 1.4;">
            请输入您的投诉、建议或业务咨询。
        </p>

        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 8px;">投诉建议 *</label>
            <textarea id="cs-content" placeholder="请输入内容..."
                style="width: 100%; min-height: 120px; padding: 12px; border-radius: 8px; border: 1.5px solid #eee; font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none;"></textarea>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 8px;">微信 ID (选填)</label>
            <input type="text" id="cs-wechat" placeholder="您的微信 ID"
                style="width: 100%; padding: 12px; border-radius: 8px; border: 1.5px solid #eee; font-size: 0.9rem; outline: none;">
        </div>

        <button id="cs-submit-btn" onclick="submitCSFeedback()"
            style="width: 100%; padding: 14px; border-radius: 12px; background: var(--primary-gradient); color: white; border: none; font-size: 1rem; font-weight: 700; cursor: pointer;">제출하기 / 提交</button>
        
        <div id="cs-status" style="margin-top: 15px; font-size: 0.85rem; text-align: center; display: none;"></div>
    </div>
</div>
