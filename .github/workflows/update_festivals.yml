name: Update Jeju Festivals

on:
  schedule:
    - cron: '0 0 * * 5' # Every Friday at 09:00 KST (00:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install puppeteer

      - name: Install Chrome dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2

      - name: Run fetch script
        run: node execution/fetch_festivals.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/curated_festivals.js
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update festival data [$(date +'%Y-%m-%d')]"
          git push
