name: Update Festival Data

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = UTC 기준 월요일 00:00
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행을 위한 트리거

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 커밋하고 푸시할 권한 필요

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium || true

      - name: Install Node.js Dependencies
        run: npm install puppeteer

      - name: Run Update Script
        run: node execution/update_festivals.js
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/curated_festivals.json
          
          # 변경사항이 있을 경우에만 커밋 및 푸시
          git diff --staged --quiet || (git commit -m "Auto-update curated festivals [skip ci]" && git push)
