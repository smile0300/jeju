<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mountain Silhouette (Hallasan) -->
  <path d="M10 45C30 45 45 40 55 30C65 20 80 15 95 30C110 45 130 50 150 50" stroke="#4338CA" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Live Pulse Dot -->
  <circle cx="165" cy="20" r="4" fill="#EF4444" class="live-dot">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Text: JEJU -->
  <text x="10" y="35" font-family="Poppins, sans-serif" font-weight="900" font-size="28" fill="#0F172A">JEJU</text>
  <!-- Text: LIVE -->
  <text x="90" y="35" font-family="Poppins, sans-serif" font-weight="400" font-size="28" fill="#4338CA">LIVE</text>
</svg>
